name: Update Playwright Snapshots

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to commit updated snapshots to
        required: true
        default: main

jobs:
  update-snapshots:
    name: Regenerate Linux WebKit snapshots
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install webkit --with-deps

      - name: Regenerate snapshots
        run: npx playwright test --update-snapshots
        env:
          CI: true

      - name: Commit updated snapshots
        run: |
          BRANCH="${{ steps.target.outputs.branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/**-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update Playwright snapshots for Linux WebKit"
            git push origin "$BRANCH"
          fi
